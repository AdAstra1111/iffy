# DEPRECATED — Use deploy.yml (unified workflow) instead.
# This file is kept for backward compatibility (workflow_dispatch only).
# Remove this file after deploy.yml has been proven stable.

name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - supabase/functions/**
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.100.1

      - name: Install Deno (for type-checking)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Validate edge function imports (Deno check)
        run: |
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            case "$name" in
              _shared|_temp-bootstrap|test-deploy|test-env) continue ;;
            esac
            if [ -f "${fn}index.ts" ]; then
              echo "Checking: $name"
              deno check --config supabase/functions/deno.json "${fn}index.ts" 2>&1 || echo "WARNING: $name has type errors (deploying anyway)"
            fi
          done

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Deployed functions: auto-run, character-atomiser, create-document-version, dev-engine-v2, devseed-autopilot, generate-document, generate-lookbook-image, generate-seed-pack, project-folder-engine"
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            case "$name" in
              _shared|_temp-bootstrap|test-deploy|test-env) continue ;;
            esac
            if [ -f "${fn}index.ts" ]; then
              echo "Deploying: $name"
              supabase functions deploy "$name" --project-ref hdfderbphdobomkdjypc --no-verify-jwt --use-api || echo "WARNING: $name deploy failed (continuing)"
            fi
          done