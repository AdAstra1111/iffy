name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Install Deno (for type-checking)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Validate edge function imports (Deno check)
        run: |
          # Type-check all edge functions — catches syntax errors, missing imports, merge conflicts
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            # Skip _shared (lib) and test/bootstrap directories
            case "$name" in
              _shared|_temp-bootstrap|test-deploy|test-env) continue ;;
            esac
            if [ -f "${fn}index.ts" ]; then
              echo "Checking: $name"
              deno check --config supabase/functions/deno.json "${fn}index.ts" 2>&1 || echo "WARNING: $name has type errors (deploying anyway)"
            fi
          done

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Deploy all edge functions dynamically — prevents missing-function drift.
          # If a function isn't ready for production, remove its directory from supabase/functions/.
          # This replaces the manual-list approach that repeatedly missed new functions.
          supabase functions deploy --all \
            --project-ref hdfderbphdobomkdjypc \
            --no-verify-jwt