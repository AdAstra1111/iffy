name: CI — Test & Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck 2>&1 | head -50; exit 0
        continue-on-error: true

      - name: Consistency Gate (frontend-backend invariants)
        run: |
          echo "=== Consistency Gate ==="
          npx vitest run src/test/frontend-backend-consistency.test.ts --reporter=verbose 2>&1
          echo ""
          echo "Policy: I1-I8,I10 BLOCK | I9 WARN"
          echo "Gate exit 0 = pass"

      - name: Run tests
        run: npm run test -- --reporter=verbose 2>&1 | tail -30

      - name: Build
        run: npm run build

      - name: Check protected files
        run: |
          PROTECTED=(
            "supabase/functions/_shared/ladder-invariant.ts"
            "supabase/functions/_shared/chunkRunner.ts"
            "supabase/functions/_shared/decisionPolicyRegistry.ts"
            "supabase/functions/_shared/docPurposeRegistry.ts"
            "supabase/functions/_shared/narrativeIntegrityEngine.ts"
            "supabase/functions/auto-run/index.ts"
            "supabase/functions/dev-engine-v2/index.ts"
            "supabase/functions/generate-document/index.ts"
            "src/pages/ProjectDevelopmentEngine.tsx"
            "vercel.json"
          )
          for f in "${PROTECTED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "⚠ MISSING: $f"
            else
              echo "✓ $f"
            fi
          done

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Tests failed or build broken. Check the CI logs before merging."