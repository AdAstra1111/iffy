name: Deploy lara-db-proxy to Lovable Supabase

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Deploy lara-db-proxy to Lovable Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy lara-db-proxy \
            --project-ref mbwreoglhudppiwaxlsp \
            --no-verify-jwt
